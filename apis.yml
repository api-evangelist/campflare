description: >-
  Campflare provides real-time campground availability data and cancellation
  alerts as a public API. The platform tracks campsites across every major
  public reservation system in North America and notifies users (via
  webhook) the moment a site matching their criteria becomes available.
  Campflare's data and services are open to the public programmatically —
  individuals and non-profits get free access to all APIs, while commercial
  use requires a paid license. Campflare also powers partner products such
  as Hipcamp Alerts. Current API access is invite-only; requests go to
  contact@campflare.com and are typically granted within 24–48 hours.
apis:
  - aid: campflare:campflare-availability-api
    name: Campflare Availability & Alerts API
    description: >-
      Real-time campground availability data at the campsite level across all
      public campgrounds Campflare tracks. Developers can query current and
      upcoming availability, inspect amenities (hookups, facilities,
      accessibility), read official agency alerts and notices, create
      availability alerts with custom date/campground/site criteria, and
      receive webhook callbacks the moment a matching site opens up. The API
      is free for individuals and non-profits; commercial use requires a
      paid license.
